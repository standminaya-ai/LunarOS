<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LunarOS</title>
  <meta name="description" content="LunarOS - Sistema operativo simulado en HTML">
  <style>
    html, body {margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#111;}
    body::before {
      content: "";
      position: absolute;
      inset:0;
      background: #0c1225 url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?fit=crop&w=1600&q=80') center/cover no-repeat;
      filter: brightness(0.6);
      z-index:0;
    }
    .loading {
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      font-family:sans-serif;
      font-size:24px;
      z-index:1;
    }
  </style>
</head>
<body>
  <div class="loading">Cargando LunarOS…</div>

  <script>
    // Espera 1 segundo y redirige a tu LunarOS
    setTimeout(() => {
      window.location.href = 'LunarOS (1).html';
    }, 1000);
  </script>
</body>
</html>
